name: Generate daily AI briefing

on:
  schedule:
    # 13:00 UTC daily = 07:00 América/Bogotá, 08:00 América/NY
    # Generates the briefing for the previous day's news.
    - cron: "0 13 * * *"
  workflow_dispatch:
    inputs:
      briefing_date:
        description: "YYYY-MM-DD (defaults to yesterday UTC)"
        required: false
        type: string

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Compute target date
        id: date
        env:
          INPUT_DATE: ${{ inputs.briefing_date }}
        run: |
          if [ -n "$INPUT_DATE" ]; then
            echo "date=$INPUT_DATE" >> "$GITHUB_OUTPUT"
          else
            echo "date=$(date -u -d 'yesterday' +%F)" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate briefing
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BRIEFING_DATE: ${{ steps.date.outputs.date }}
        run: python scripts/generate_briefing.py

      - name: Commit to daily branch
        env:
          DATE: ${{ steps.date.outputs.date }}
        run: |
          set -euo pipefail
          BRANCH="claude/daily-$DATE"
          FILE="noticias-ia-$DATE.html"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH"
          git add "$FILE"
          git commit -m "Add daily AI briefing for $DATE"
          git push -u --force-with-lease origin "$BRANCH"

      - name: Delete previous daily branches
        env:
          DATE: ${{ steps.date.outputs.date }}
        run: |
          set -euo pipefail
          KEEP="claude/daily-$DATE"
          git ls-remote --heads origin 'claude/daily-*' \
            | awk '{print $2}' \
            | sed 's|^refs/heads/||' \
            | while read -r branch; do
                if [ -n "$branch" ] && [ "$branch" != "$KEEP" ]; then
                  echo "Deleting $branch"
                  git push origin --delete "$branch" || echo "  (could not delete $branch — continuing)"
                fi
              done

      - name: Send to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NEWS_FILE: noticias-ia-${{ steps.date.outputs.date }}.html
        run: python scripts/send_to_telegram.py
